name: Build and deploy ASP.Net Core app with React - observexall

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # --- ১. ফ্রন্টএন্ড বিল্ড করা ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # --- ২. ব্যাকএন্ড সেটআপ ও পাবলিশ করা ---
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      # পাবলিশ করার সময় Models এবং wwwroot সব একসাথে প্যাক হবে
      - name: dotnet publish
        run: dotnet publish ObserveX.Api/ObserveX.Api.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      # --- ৩. ফ্রন্টএন্ড ফাইলগুলো wwwroot এ কপি করা ---
      # Vite ব্যবহার করলে 'dist' আর Create React App হলে 'build' ফোল্ডার হবে
      - name: Copy React build to wwwroot
        run: |
          mkdir -p ${{env.DOTNET_ROOT}}/myapp/wwwroot
          cp -r frontend/dist/* ${{env.DOTNET_ROOT}}/myapp/wwwroot/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A5E4704798F947F9804E71ADC3E1299B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C0B7747897564ED59D0B2CC056F0D4E9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D2FEBF91B32A411AB15562B1E27C5F15 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'observexall'
          slot-name: 'Production'
          package: .
